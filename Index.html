<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujograma: Acuerdos de los minors - Universidad EIA</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para transformar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Definición de iconos usando SVG para asegurar compatibilidad total
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(0);
            const [selectedStep, setSelectedStep] = useState(null);

            const tabs = [
                { id: 0, title: "1. Creación y aprobación", icon: "settings" },
                { id: 1, title: "2. Matrícula y cursado", icon: "graduation-cap" },
                { id: 2, title: "3. Certificación y casos", icon: "award" }
            ];

            const ProcessStep = ({ title, responsibles, description, isDecision = false }) => (
                <div 
                    className={`relative p-4 rounded-lg border-2 transition-all cursor-pointer hover:shadow-md min-w-[200px] ${
                        isDecision ? 'border-amber-400 bg-amber-50' : 'border-blue-100 bg-white'
                    }`}
                    onClick={() => setSelectedStep({ title, responsibles, description })}
                >
                    <div className="flex flex-col gap-2">
                        {responsibles && (
                            <div className="flex gap-1 flex-wrap">
                                {responsibles.map((r, i) => (
                                    <span key={i} className="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded-full font-medium">
                                        {r}
                                    </span>
                                ))}
                            </div>
                        )}
                        <h4 className={`text-sm font-semibold leading-tight ${isDecision ? 'text-amber-800' : 'text-slate-800'}`}>
                            {title}
                        </h4>
                    </div>
                    {isDecision && (
                        <div className="absolute -right-3 top-1/2 -translate-y-1/2 bg-white rounded-full p-0.5 border border-amber-400">
                            <Icon name="help-circle" size={14} className="text-amber-500" />
                        </div>
                    )}
                </div>
            );

            const Connector = ({ label, color = "blue" }) => (
                <div className="flex flex-col items-center justify-center min-w-[40px]">
                    <div className={`h-0.5 w-full bg-${color}-200 relative`}>
                        <div className={`absolute right-0 -top-1 border-t-4 border-b-4 border-l-4 border-transparent border-l-${color}-200`} />
                    </div>
                    {label && <span className={`text-[10px] font-bold text-${color}-600 mt-1 uppercase`}>{label}</span>}
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8">
                        <h1 className="text-2xl font-bold text-slate-800 mb-2">Flujograma: Acuerdos de los minors académicos</h1>
                        <p className="text-slate-500 text-sm">Universidad EIA • Gestión Curricular</p>
                    </header>

                    <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
                        <div className="w-full md:w-64 bg-slate-900 p-4 flex flex-col gap-2">
                            {tabs.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => { setActiveTab(tab.id); setSelectedStep(null); }}
                                    className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium ${
                                        activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                                    }`}
                                >
                                    <Icon name={tab.icon} size={18} />
                                    {tab.title}
                                </button>
                            ))}
                            <div className="mt-auto pt-8">
                                <div className="p-4 bg-slate-800 rounded-xl border border-slate-700 text-[11px] text-slate-400">
                                    <h5 className="text-xs font-bold text-slate-500 uppercase mb-2">Nota clave</h5>
                                    Los minors se construyen solo con asignaturas de pregrado de la EIA.
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 p-6 overflow-x-auto custom-scrollbar">
                            {activeTab === 0 && (
                                <div className="flex flex-col gap-8 min-w-[900px]">
                                    <div className="flex items-center gap-4">
                                        <ProcessStep title="Propuesta de idea" responsibles={["Proponente"]} />
                                        <Connector />
                                        <ProcessStep title="Formulario institucional" responsibles={["Proponente"]} />
                                        <Connector />
                                        <div className="p-4 rounded-lg bg-blue-50 border border-blue-200 w-64">
                                            <h4 className="text-xs font-bold text-blue-700 uppercase mb-2">Criterios curriculares</h4>
                                            <ul className="text-[10px] space-y-1 text-blue-800">
                                                <li>• Carga mínima: 9 créditos</li>
                                                <li>• Articulación gradual y coherente</li>
                                                <li>• Microcurrículos actualizados</li>
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 ml-8">
                                        <Icon name="arrow-right-circle" className="text-slate-300" />
                                        <ProcessStep title="¿Cumple criterios curriculares?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="Revisión Dirección Programa" responsibles={["Dir. Programa"]} />
                                        <Connector label="Visto Bueno" color="green" />
                                        <ProcessStep title="Viabilidad Comité" responsibles={["Comité Currículo"]} />
                                    </div>
                                </div>
                            )}

                            {activeTab === 1 && (
                                <div className="flex flex-col gap-8 min-w-[800px]">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-slate-100 rounded-lg text-xs font-bold text-slate-500">INICIO</div>
                                        <ProcessStep title="Elección de minor" responsibles={["Estudiante"]} />
                                        <Connector />
                                        <ProcessStep title="¿Aplica para su programa?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="Solicitud formal" responsibles={["Dir. Programa"]} />
                                    </div>
                                    <div className="flex items-center gap-4 ml-8">
                                        <Icon name="arrow-right-circle" className="text-slate-300" />
                                        <ProcessStep title="¿Cumple prerrequisitos?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="¿Hay cupos?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <div className="p-4 bg-blue-600 text-white rounded-lg font-bold text-sm">CURSAR ASIGNATURAS</div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 2 && (
                                <div className="flex flex-col gap-8">
                                    <div className="flex items-center gap-4">
                                        <ProcessStep title="¿Aprueba todas las asignaturas?" isDecision responsibles={["Sistema"]} />
                                        <Connector label="Sí" color="green" />
                                        <div className="flex items-center gap-4 p-4 bg-green-50 border border-green-200 rounded-xl">
                                            <Icon name="award" size={24} className="text-green-500" />
                                            <div>
                                                <h4 className="text-sm font-bold text-green-800">Certificado Académico</h4>
                                                <p className="text-xs text-green-600">Insignia digital otorgada</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="p-4 bg-slate-50 border rounded-xl text-[11px]">
                                            <h5 className="font-bold text-blue-600 uppercase mb-1">Egresados</h5>
                                            Hasta 2 años después de graduarse.
                                        </div>
                                        <div className="p-4 bg-slate-50 border rounded-xl text-[11px]">
                                            <h5 className="font-bold text-amber-600 uppercase mb-1">Reprobación</h5>
                                            Puede repetirse o renunciar al minor.
                                        </div>
                                    </div>
                                </div>
                            )}

                            {selectedStep && (
                                <div className="mt-8 p-4 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg">
                                    <div className="flex justify-between items-start">
                                        <h3 className="font-bold text-blue-900">{selectedStep.title}</h3>
                                        <button onClick={() => setSelectedStep(null)} className="text-blue-400">
                                            <Icon name="x-circle" size={20} />
                                        </button>
                                    </div>
                                    <p className="text-sm text-blue-800 mt-2">Detalles del proceso institucional según el acuerdo de minors.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
